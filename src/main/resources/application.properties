spring.application.name=snake-game
# 로컬 8080/8081/8082/8090이 다른 프로세스에 점유돼 있어 8085 사용
server.port=8085
# WebSocket 허용 오리진 — 크로스사이트 하이재킹 방지. 배포 시 서비스 도메인으로 교체 (쉼표 구분)
game.allowed-origins=http://localhost:8085

# H2 파일 모드 — 재시작에도 회원·크레딧·스킨 데이터 유지
spring.datasource.url=jdbc:h2:file:./data/snakegame
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.jpa.hibernate.ddl-auto=update
spring.jpa.open-in-view=false

# 세션 쿠키 SameSite=Lax — 크로스사이트 요청에 세션이 실리지 않아 CSRF 방어의 1차 축 (SecurityConfig 주석 참조)
server.servlet.session.cookie.same-site=lax
server.servlet.session.cookie.http-only=true

